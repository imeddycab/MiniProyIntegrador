<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Usuario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .delete-container {
            width: 100%;
            max-width: 500px;
        }

        .delete-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .warning-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        p {
            color: #86868b;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .user-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        .user-info p {
            color: #515154;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .user-info .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        .badge.admin {
            background: #0071e3;
            color: white;
        }

        .badge.user {
            background: #f5f5f7;
            color: #1d1d1f;
            border: 1px solid #d2d2d7;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-delete {
            background: #ff3b30;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 12px 24px;
            border: 1px solid #d2d2d7;
            border-radius: 20px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="delete-container">
        <div class="delete-card">
            <div class="warning-icon">⚠️</div>
            <h1>¿Eliminar usuario?</h1>
            <p>Esta acción no se puede deshacer</p>
            
            <div class="user-info">
                <h3>{{ usuario.get_full_name|default:usuario.username }}</h3>
                <p>👤 @{{ usuario.username }}</p>
                <p>📧 {{ usuario.email|default:"Sin email" }}</p>
                <span class="badge {% if usuario.is_staff %}admin{% else %}user{% endif %}">
                    {{ usuario.is_staff|yesno:"Administrador,Usuario" }}
                </span>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn-delete">Sí, eliminar</button>
                    <a href="{% url 'lista_usuarios' %}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
