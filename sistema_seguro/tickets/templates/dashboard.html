<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema — Bienvenido</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a2540;
    --bg: #f0f4fb;
    --blue: #4a6fa5;
    --blue-pale: #dce8f7;
    --muted: #7a8baa;
    --line: #d4dff0;
    --white: #ffffff;
  }

  body {
    background-color: var(--bg);
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    position: relative;
    background: var(--white);
    border: 1px solid var(--line);
    padding: 48px 56px 44px;
    width: 100%;
    max-width: 440px;
    text-align: center;
    box-shadow: 0 2px 4px rgba(74,111,165,0.06), 0 8px 32px rgba(74,111,165,0.09);
    animation: rise 0.5s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--blue);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 1.25rem;
    font-weight: bold;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--line);
    margin: 18px 0;
  }

  p {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.78rem;
    color: var(--blue);
    background: var(--blue-pale);
    border: 1px solid rgba(74,111,165,0.2);
    padding: 5px 14px;
    border-radius: 3px;
    margin-bottom: 28px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--blue);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  button {
    width: 100%;
    padding: 11px 20px;
    background: var(--blue);
    border: none;
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.2s;
  }

  button:hover { background: #3a5f95; }

  .register-link{
    margin-top:18px;
    font-size:0.8rem;
    color:var(--muted);
  }

  .register-link a{
    color:var(--blue);
    text-decoration:none;
    font-weight:bold;
  }

  .register-link a:hover{
    text-decoration:underline;
  }

  .footer-note {
    margin-top: 24px;
    font-size: 0.72rem;
    color: #b0bdd4;
  }
</style>
</head>

<body>

<div class="card">

  <h1>Bienvenido al Sistema</h1>

  <div class="divider"></div>

  <p>Ha iniciado sesión correctamente.<br>Su sesión está activa y segura.</p>

  <div class="status-badge">
    <span class="status-dot"></span>
    Sesión activa
  </div>

  <form action="/logout/" method="post">
    {% csrf_token %}
    <button type="submit">Cerrar sesión</button>
  </form>

  <div class="register-link">
    ¿No tienes cuenta? <a href="/registro/">Crear cuenta</a>
  </div>

  <p class="footer-note">© 2026 Sistema Corporativo</p>

</div>

</body>
</html>
