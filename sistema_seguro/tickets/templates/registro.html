<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro — Sistema</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a2540;
  --bg: #f0f4fb;
  --blue: #4a6fa5;
  --blue-pale: #dce8f7;
  --muted: #7a8baa;
  --line: #d4dff0;
  --white: #ffffff;
}

body {
  background-color: var(--bg);
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  position: relative;
  background: var(--white);
  border: 1px solid var(--line);
  padding: 48px 56px 44px;
  width: 100%;
  max-width: 440px;
  text-align: center;
  box-shadow: 0 2px 4px rgba(74,111,165,0.06), 0 8px 32px rgba(74,111,165,0.09);
  animation: rise 0.5s ease both;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
}

@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 1.25rem;
  font-weight: bold;
  color: var(--ink);
  margin-bottom: 10px;
}

.divider {
  width: 100%;
  height: 1px;
  background: var(--line);
  margin: 18px 0;
}

p {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 20px;
}

form {
  text-align: left;
}

label {
  font-size: 0.8rem;
  color: var(--ink);
  display: block;
  margin-bottom: 5px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 1px solid var(--line);
  border-radius: 3px;
  font-size: 0.85rem;
}

input:focus {
  outline: none;
  border-color: var(--blue);
}

button {
  width: 100%;
  padding: 11px 20px;
  background: var(--blue);
  border: none;
  color: var(--white);
  font-size: 0.85rem;
  font-weight: bold;
  letter-spacing: 0.04em;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s;
}

button:hover { background: #3a5f95; }

.login-link {
  margin-top: 18px;
  font-size: 0.8rem;
  text-align: center;
}

.login-link a {
  color: var(--blue);
  text-decoration: none;
}

.login-link a:hover {
  text-decoration: underline;
}

.footer-note {
  margin-top: 24px;
  font-size: 0.72rem;
  color: #b0bdd4;
}
</style>
</head>

<body>

<div class="card">

<h1>Crear Cuenta</h1>
<div class="divider"></div>

<p>Regístrese para acceder al sistema.</p>

<form method="POST">
{% csrf_token %}

<label>Usuario</label>
<input type="text" name="username" required>

<label>Contraseña</label>
<input type="password" name="password" required>

<button type="submit">Registrarse</button>

</form>

<div class="login-link">
¿Ya tienes cuenta? <a href="/login/">Iniciar sesión</a>
</div>

<p class="footer-note">© 2026 Sistema Corporativo</p>

</div>

</body>
</html>
