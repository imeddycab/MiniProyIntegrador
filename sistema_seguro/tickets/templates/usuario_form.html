<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ accion }} Usuario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 16px 0;
        }

        .nav-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            text-decoration: none;
        }

        .nav-link {
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
        }

        .main-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .form-card h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            grid-column: span 2;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary {
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 12px 24px;
            border: 1px solid #d2d2d7;
            border-radius: 20px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .message.error {
            background: #ffebeb;
            color: #ff3b30;
            border-left: 4px solid #ff3b30;
        }

        .help-text {
            font-size: 12px;
            color: #86868b;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{% url 'lista_tickets' %}" class="nav-brand">Tickets</a>
            <a href="{% url 'lista_usuarios' %}" class="nav-link">← Volver a Usuarios</a>
        </div>
    </nav>

    <main class="main-content">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="form-card">
            <h1>{{ accion }} Usuario</h1>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre de usuario *</label>
                        <input type="text" name="username" value="{{ usuario.username|default:'' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ usuario.email|default:'' }}">
                    </div>
                    
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" name="first_name" value="{{ usuario.first_name|default:'' }}">
                    </div>
                    
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" name="last_name" value="{{ usuario.last_name|default:'' }}">
                    </div>
                    
                    {% if accion == 'Crear' %}
                    <div class="form-group">
                        <label>Contraseña *</label>
                        <input type="password" name="password" required>
                        <div class="help-text">Mínimo 8 caracteres</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirmar contraseña *</label>
                        <input type="password" name="password2" required>
                    </div>
                    {% else %}
                    <div class="form-group full-width">
                        <label>Nueva contraseña (dejar en blanco para no cambiar)</label>
                        <input type="password" name="new_password">
                    </div>
                    {% endif %}
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" name="is_staff" id="is_staff" {% if usuario.is_staff %}checked{% endif %}>
                        <label for="is_staff">¿Es administrador?</label>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" name="is_active" id="is_active" {% if usuario.is_active|default_if_none:True %}checked{% endif %}>
                        <label for="is_active">¿Usuario activo?</label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Guardar Usuario</button>
                        <a href="{% url 'lista_usuarios' %}" class="btn-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
